name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            bin: mnemosyne
            archive: tar.gz

          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            bin: mnemosyne
            archive: tar.gz

          - target: x86_64-apple-darwin
            os: macos-latest
            bin: mnemosyne
            archive: tar.gz

          - target: aarch64-apple-darwin
            os: macos-latest
            bin: mnemosyne
            archive: tar.gz

          - target: x86_64-pc-windows-msvc
            os: windows-latest
            bin: mnemosyne.exe
            archive: zip

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Package (Unix)
        if: matrix.archive == 'tar.gz'
        run: |
          ARCHIVE="${{ matrix.bin }}-${{ github.ref_name }}-${{ matrix.target }}.tar.gz"
          mkdir dist
          cp target/${{ matrix.target }}/release/memory-hooks dist/
          cp target/${{ matrix.target }}/release/memory-mcp-server dist/
          cp target/${{ matrix.target }}/release/session-ingester dist/
          tar -czf "$ARCHIVE" -C dist .
          echo "ARCHIVE=$ARCHIVE" >> $GITHUB_ENV

      - name: Package (Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $archive = "${{ matrix.bin }}-${{ github.ref_name }}-${{ matrix.target }}.zip"
          New-Item -ItemType Directory -Path dist
          Copy-Item "target\${{ matrix.target }}\release\memory-hooks.exe" dist\
          Copy-Item "target\${{ matrix.target }}\release\memory-mcp-server.exe" dist\
          Copy-Item "target\${{ matrix.target }}\release\session-ingester.exe" dist\
          Compress-Archive -Path "dist\*" -DestinationPath $archive
          echo "ARCHIVE=$archive" >> $env:GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PROJECT_NAME }}-${{ matrix.target }}
          path: ${{ env.ARCHIVE }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
